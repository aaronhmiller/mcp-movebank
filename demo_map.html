const WEATHER = null;

// ---- Sample data so the file renders standalone (a synthetic looping seabird) ----
function sampleTrips() {
  const path=[], ts=[], n=240;
  for (let i=0;i<n;i++){
    const u=i/n, ang=u*2*Math.PI;
    path.push([ -89.6 + 4.5*Math.sin(ang) - 2.0*u, -1.4 + 2.6*Math.sin(2*ang) ]);
    ts.push(Math.round(u*86400*120*10)/10); // 120 days
  }
  const meta={ n_individuals:1, bbox:[-96,-5,-84,3], time_start:"2008-05-31T00:00:00+00:00",
    time_end:"2008-09-28T00:00:00+00:00", t0_ms:1212192000000, duration_s:86400*120,
    individuals:[{individual:"SAMPLE-albatross", taxon:"Phoebastria irrorata (demo)",
      n_points:n, track_km:4200, color_rgb:[57,192,237]}] };
  return { meta, trips:[{ individual:"SAMPLE-albatross", taxon:"demo",
    color:[57,192,237], t0_ms:1212192000000, path, timestamps:ts }] };
}

const data = (TRIPS && TRIPS.trips && TRIPS.trips.length) ? TRIPS : sampleTrips();
const weather = (WEATHER && WEATHER.cells) ? WEATHER : {cells:[], grid_deg:0.25};
const DUR = data.meta.duration_s || Math.max(...data.trips.flatMap(t=>t.timestamps));
const T0  = data.meta.t0_ms || 0;
const GRID = weather.grid_deg || 0.25;

// Index weather by day -> cells, and find max precip for color scaling.
const wxByDay = {}; let wxMax = 1;
for (const c of weather.cells) {
  (wxByDay[c.date] ||= []).push(c);
  if (typeof c.precipitation_sum === "number") wxMax = Math.max(wxMax, c.precipitation_sum);
}
const dayKey = ms => new Date(ms).toISOString().slice(0,10);

// ---- Basemap (CARTO dark, no API key) ----
const b = data.meta.bbox;
const map = new maplibregl.Map({
  container:"map",
  style:"https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  bounds:[[b[0],b[1]],[b[2],b[3]]], fitBoundsOptions:{padding:60}, attributionControl:true
});

const overlay = new deck.MapboxOverlay({ interleaved:false, layers:[] });
map.on("load", () => { map.addControl(overlay); animate(); });

// ---- Animation state ----
let t = 0, playing = true;
const $ = id => document.getElementById(id);

function precipColor(mm){
  const x = Math.min(1, mm / wxMax);
  // transparent->cyan->blue ramp
  return [ Math.round(20+60*x), Math.round(120+100*x), Math.round(160+95*x), Math.round(140*x) ];
}

function layers(){
  const ls = [];
  if ($("wxToggle").checked && weather.cells.length){
    const day = dayKey(T0 + t*1000);
    const cells = wxByDay[day] || [];
    ls.push(new deck.PolygonLayer({
      id:"wx", data:cells, stroked:false, filled:true, pickable:false,
      getPolygon:c => { const h=GRID/2,la=c.lat,lo=c.lon;
        return [[lo-h,la-h],[lo+h,la-h],[lo+h,la+h],[lo-h,la+h]]; },
      getFillColor:c => precipColor(c.precipitation_sum||0),
      updateTriggers:{ getFillColor:[day], getPolygon:[day] }
    }));
  }
  ls.push(new deck.TripsLayer({
    id:"trips", data:data.trips,
    getPath:d=>d.path, getTimestamps:d=>d.timestamps, getColor:d=>d.color,
    opacity:0.85, widthMinPixels:3, rounded:true, fadeTrail:true,
    trailLength: DUR * (+$("trail").value/100), currentTime:t,
    updateTriggers:{ trailLength:[$("trail").value] }
  }));
  // Leading dot at each animal's current position.
  ls.push(new deck.ScatterplotLayer({
    id:"heads", data:data.trips, pickable:true,
    getPosition:d=>{ let k=0; while(k<d.timestamps.length-1 && d.timestamps[k]<t) k++; return d.path[k]; },
    getFillColor:d=>d.color, getRadius:5, radiusMinPixels:4, radiusMaxPixels:8,
    updateTriggers:{ getPosition:[t] }
  }));
  return ls;
}

function render(){
  overlay.setProps({ layers: layers() });
  $("clock").textContent = new Date(T0 + t*1000).toISOString().replace("T"," ").slice(0,16)+" UTC";
  $("scrub").value = Math.round(1000 * t / DUR);
}

let last = performance.now();
function animate(){
  const now = performance.now(), dt = (now-last)/1000; last = now;
  if (playing){
    const perSec = DUR / (210 - +$("speed").value); // higher slider = faster
    t += dt * perSec;
    if (t > DUR){ t = 0; }
  }
  render();
  requestAnimationFrame(animate);
}

$("play").onclick   = e => { playing=!playing; e.target.textContent = playing?"⏸ Pause":"▶ Play"; };
$("restart").onclick= () => { t=0; };
$("scrub").oninput  = e => { t = DUR * (+e.target.value/1000); playing=false; $("play").textContent="▶ Play"; };

  return `<div class="lg"><span class="sw" style="background:rgb(${c[0]},${c[1]},${c[2]})"></span>`+
         `<span>${i.individual}</span><span class="muted">${i.track_km||""}${i.track_km?" km":""}</span></div>`;
}).join("") + (weather.cells.length?`<div class="muted" style="margin-top:6px">precip overlay: ERA5 daily, ${GRID}° grid</div>`:"");
</script>
</body>
</html>
